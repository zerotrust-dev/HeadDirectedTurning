[General]
# Increase only when the settings contract changes incompatibly.
SchemaVersion=1
# DiagnosticOnly prevents this early build from rotating the player.
Enabled=true
DiagnosticOnly=true
LogPoseSamples=true

[Turning]
# Degrees of head yaw allowed before turning starts.
StartAngle=15.0
# Smaller stop angle provides hysteresis and prevents threshold chatter.
StopAngle=11.0
MaximumAngle=55.0
MinimumTurnSpeed=12.0
MaximumTurnSpeed=75.0
AccelerationCurve=2.2
# Time constant in seconds; behavior remains consistent at 72, 90, or 120 Hz.
SmoothingSeconds=0.06

[Safety]
PauseInMenus=true
PauseWhenGameUnfocused=true
PauseWhileMounted=true
