[General]
# Increase only when the settings contract changes incompatibly.
SchemaVersion=1
# Set true only when collecting pose diagnostics without sending turn input.
Enabled=true
DiagnosticOnly=false
LogPoseSamples=true

[Turning]
# Degrees of head yaw allowed before turning starts.
StartAngle=15.0
# Stop immediately upon returning to the full free-look zone.
StopAngle=15.0
# While locomoting, align the body with gaze after a smaller head turn.
MovingStartAngle=5.0
# Stop an active turn after the head moves this far back toward center.
StopOnReturnDegrees=2.0
# Left-stick magnitude that counts as locomotion.
MovementInputThreshold=0.15
MaximumAngle=55.0
MinimumTurnSpeed=12.0
MaximumTurnSpeed=75.0
AccelerationCurve=2.2
# Time constant in seconds; behavior remains consistent at 72, 90, or 120 Hz.
SmoothingSeconds=0.06
# Smallest synthetic stick value after the head passes StartAngle.
# This must clear Skyrim's controller deadzone.
MinimumStickOutput=0.45
# Fraction of the synthetic right-stick range available to this plugin.
# Full range remains available; head angle and response curve control speed.
OutputScale=1.00
# False matches Skyrim VR's mapped Look direction on the tested setup.
InvertDirection=false

[Safety]
PauseInMenus=true
# Desktop focus is not meaningful for OpenComposite/OpenXR HMD sessions.
PauseWhenGameUnfocused=false
# MGO keeps PlayerControls::blockPlayerInput set during normal VR gameplay.
PauseWhenInputBlocked=false
PauseWhileMounted=true
